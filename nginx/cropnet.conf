# CropNet API — Nginx config
# Place at: /etc/nginx/sites-available/cropnet
# Symlink:  ln -s /etc/nginx/sites-available/cropnet /etc/nginx/sites-enabled/cropnet

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=cropnet_api:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=cropnet_health:10m rate=60r/m;

upstream cropnet_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name api.cropnet.fellah.tn;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.cropnet.fellah.tn;

    # SSL — managed by Certbot (let's encrypt)
    ssl_certificate     /etc/letsencrypt/live/api.cropnet.fellah.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cropnet.fellah.tn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Max upload size (10MB for images)
    client_max_body_size 10M;
    client_body_timeout 30s;

    # Health check — higher rate limit
    location /health {
        limit_req zone=cropnet_health burst=20 nodelay;
        proxy_pass http://cropnet_backend;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        access_log off;
    }

    # Predict endpoint — strict rate limit
    location /predict {
        limit_req zone=cropnet_api burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://cropnet_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Docs (Swagger / ReDoc) — dev only, block in prod if needed
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://cropnet_backend;
        proxy_set_header Host $host;
    }

    # Block everything else
    location / {
        return 404;
    }
}
